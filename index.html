<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rupee Calculator</title>

    <script src="Script.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap"
    rel="stylesheet"
  />

  <body>
    <div class="hearts">
      <span>💖</span>
      <span>💗</span>
      <span>💓</span>
      <span>💞</span>
      <span>💕</span>
    </div>

    <div class="card">
      <h2>💰 Rupee Calculator</h2>

      <label>Enter the Cash Amount:</label>
      <input type="number" id="cash_amount" onkeydown="handleEnter(event)" />

      <br />

      <button onclick="playSound(); Cal()">Calculate</button>
      <audio id="clickSound" src="Coin Drop.mp3.mp3"></audio>
      
      <p id="result"></p>
    </div>

  </body>
</html>
